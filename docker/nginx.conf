# Límite de peticiones para endpoints de autenticación
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ─── HTTP → HTTPS ────────────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name api.mvhflores.co;
    return 301 https://$host$request_uri;
}

# ─── HTTPS API ───────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name api.mvhflores.co;

    # Certificados Let's Encrypt (Certbot los gestiona)
    ssl_certificate     /etc/letsencrypt/live/api.mvhflores.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.mvhflores.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                      always;
    add_header X-Frame-Options           "DENY"                                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

    # GZIP
    gzip            on;
    gzip_comp_level 5;
    gzip_types      application/json text/plain;

    # Rate limit en auth
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # Bold webhook sin rate limit (usa firma HMAC)
    location /api/v1/payments/webhook {
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }

    # Todo lo demás
    location / {
        proxy_pass http://127.0.0.1:4000;
        include /etc/nginx/proxy_params;
    }
}
